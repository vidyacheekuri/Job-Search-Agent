# Conda environment for Job Search Agent
# Assignment: requirements.txt / environment.yml
name: job-search-agent
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10
  - pip
  - pip:
    - click>=8.1.0
    - requests>=2.31.0
    - beautifulsoup4>=4.12.0
    - rich>=13.7.0
    - lxml>=5.1.0
    - fastapi>=0.109.0
    - uvicorn>=0.27.0
    - pydantic>=2.5.0
    - python-multipart>=0.0.6
    - openai>=1.0.0
    - PyPDF2>=3.0.0
